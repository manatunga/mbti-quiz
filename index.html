<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI Quiz</title>

    <!--Tailwind CSS CDN-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>


<body class="m-0 min-h-screen flex justify-center items-center font-sans bg-slate-50 text-slate-800 p-4">
    
    <!--------Main Quiz Card Container-------->
    <main id="quiz-container" class="w-full max-w-2xl rounded-2xl shadow-xl bg-white border border-slate-100 p-6">

        <!-----Header Stack: Title and Progress Bar----->
        <div class="mb-8 flex flex-col items-center">
            <h1 class="text-4xl font-bold tracking-wide text-indigo-800 mb-2">What is your MBTI?</h1>

            <div class="flex items-center justify-between text-m text-slate-500 mb-6">
                <span id="progress-text" class="font-medium">Question 1 of 28</span>
            </div>

            <!--Progress Bar Container-->
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-600 h-full rounded-full transition-all duration-500 ease-out" style="width: 3.5%"></div>
            </div>
        </div>

        <!-----Scenario/Question Display----->
        <h2 id="question-text" class="text-xl md:text-2xl font-semibold text-slate-900 leading-snug mb-8 min-h-[4rem]">
            Loading Question...
        </h2>

        <!-----Action Choice Buttons----->
        <div class="flex flex-col gap-4">
            <button id="btn-A" class="w-full text-left bg-slate-50 hover:bg-indigo-50 border-2 border-slate-200 hover:border-indigo-500 rounded-xl p-6 font-medium transition-all duration-300 cursor-pointer">
                Option A
            </button>
            
            <button id="btn-B" class="w-full text-left bg-slate-50 hover:bg-indigo-50 border-2 border-slate-200 hover:border-indigo-500 rounded-xl p-6 font-medium transition-all duration-300 cursor-pointer">
                Option B
            </button>
        </div>

    </main>

    <!--------Application Script-------->
    <script src=""></script>
</body>
</html>
